<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/style.css" />
    <title>Notes App</title>
  </head>
  <body>
    <header>
      <header-bar></header-bar>
    </header>
    <main>
      <div class="container">
        <section class="addNotes" id="form">
          <h2>Create Notes</h2>
          <form id="notesForm">
            <div>
              <label class="label-judul" for="notesFormTitle">Title</label>
              <input
                id="notesFormTitle"
                name="notesFormTitle"
                type="text"
                required
                placeholder=" Judul"
              />
            </div>
            <div>
              <label class="label-judul" for="notesFormDescription"
                >Description</label
              >
              <textarea
                id="notesFormDescription"
                name="text"
                required
                placeholder="Description"
              ></textarea>
            </div>
            <button id="notesFormSubmit" type="submit">Add Note</button>
          </form>
        </section>

        <section class="myNotes" id="note">
          <h2>My Notes</h2>
          <div id="notesList">
            <h3 id="notesItemTitle">Welcome to Notes, Dimas!</h3>
            <p id="notesItemDescription">
              Welcome to Notes! This is your first note. You can archive it,
              delete it, or create new ones.
            </p>
            <p id="notesItemDate">2022-07-28T10:03:12.594Z</p>
            <form id="button-group">
              <button id="deleteButton">Delete</button>
              <button id="archivedButton">archived</button>
              <button id="unarchivedButton">unarchived</button>
            </form>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
    <footer>
      <footer-bar></footer-bar>
    </footer>
  </body>
</html>
